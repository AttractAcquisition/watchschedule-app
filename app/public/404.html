<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WatchSchedule</title>
    <!-- GitHub Pages SPA deep-link fix (frontend.md §1/§9).
         GitHub Pages has no server rewrite, so a hard load of a client route
         404s. This page encodes the requested path into the query string and
         redirects to index.html, where the restore script rebuilds the URL.
         pathSegmentsToKeep = 0 because the app is served at the domain root
         (custom domain app.watchschedule.com), not a project subpath. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
